name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Скачиваем код
        uses: actions/checkout@v4

      - name: 🔑 Логин в GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔤 Приводим имя репозитория к нижнему регистру
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: 🛠️ Сборка и пуш Docker-образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest
          build-args: |
            API_URL=${{ secrets.API_URL }}

      - name: 🚀 Деплой на сервер по SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/rusapi
            
            # Авторизуемся в GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Скачиваем свежий образ фронтенда
            docker compose pull frontend
            
            # Запускаем/обновляем ТОЛЬКО фронтенд (бэкенд не прервет работу!)
            docker compose up -d frontend